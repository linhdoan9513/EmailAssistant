services:
  - type: web
    name: django-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.config.wsgi
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.config.settings
      - key: PYTHONPATH
        value: backend
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False