services:
  - type: web
    name: django-backend
    env: python

    buildCommand: |
      pip install -r requirements.txt
      python backend/manage.py collectstatic --noinput

    startCommand: gunicorn backend.config.wsgi:application

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.config.settings
      - key: PYTHONPATH
        value: backend
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
